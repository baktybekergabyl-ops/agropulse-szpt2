name: Update AgroPulse data

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Update mode"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - prices
          - monthly
  schedule:
    # Asia/Qyzylorda = UTC+5. Friday 12:30 local.
    - cron: "30 7 * * 5"
    # Asia/Qyzylorda = UTC+5. Daily 15:00 local after the 15th.
    - cron: "0 10 15-31 * *"

permissions:
  contents: write

concurrency:
  group: agropulse-data-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Resolve update mode
        id: mode
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event.schedule }}" == "30 7 * * 5" ]]; then
            echo "mode=prices" >> "$GITHUB_OUTPUT"
          else
            echo "mode=monthly" >> "$GITHUB_OUTPUT"
          fi

      - name: Update data
        run: python scripts/github_pages_update.py --mode "${{ steps.mode.outputs.mode }}"

      - name: Commit updated public data
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html app.js styles.css data/bns.json data/raw data/cache dashboard/data || true
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update AgroPulse data (${{ steps.mode.outputs.mode }})"
            git push
          fi
